<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Жалоба на нарушение (КК2)</title>
                <style>
                        body {
                                    flex-direction: column;
                                                justify-content: space-between;
                                                            align-items: center;
                                                                        height: 100vh;
                                                                                    margin: 0;
                                                                                                font-family: Arial, sans-serif;
                                                                                                            color: Red;
                                                                                                                        text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.7);
                                                                                                                                }
                                                                                                                                        h1 {
                                                                                                                                                    margin: 20px 0;
                                                                                                                                                                font-size: 48px;
                                                                                                                                                                            text-align: center;
                                                                                                                                            
                                                                                                                                                                                    }
                                                                                                                                                                                            button {
                                                                                                                                                                                                        padding: 15px 30px;
                                                                                                                                                                                                                    font-size: 18px;
                                                                                                                                                                                                                                color: white;
                                                                                                                                                                                                                                            background-color: Red;
                                                                                                                                                                                                                                                        border: none;
                                                                                                                                                                                                                                                                    border-radius: 5px;
                                                                                                                                                                                                                                                                                cursor: pointer;
                                                                                                                                                                                                                                                                                            transition: background-color 0.3s ease;
                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                            button:hover {
                                                                                                                                                                                                                                                                                                                        background-color: #218838;
                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                        .content {
                                                                                                                                                                                                                                                                                                                                                    display: flex;
                                                                                                                                                                                                                                                                                                                                                                flex-direction: column;
                                                                                                                                                                                                                                                                                                                                                                            justify-content: center;
                                                                                                                                                                                                                                                                                                                                                                                        align-items: center;
                                                                                                                                                                                                                                                                                                                                                                                                    flex: 1;
                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                </style>
                                                                                                                                                                                                                                                                                                                                                                                                                </head>
                                                                                                                                                                                                                                                                                                                                                                                                                <body>
                                                                                                                                                                                                                                                                                                                                                                                                                    <h1>Красный Кулак 2</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="content">
                                                                                                                                                                                                                                                                                                                                                                                                                                <button onclick="sendEmail()">Отправить жалобу</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                function sendEmail() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                            const email = encodeURIComponent("rsoc_in@rkn.gov.ru");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const subject = encodeURIComponent("нарушение законодательства, приченение вреда людям");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const body = encodeURIComponent(
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    `Здравствуйте. Хотел бы пожаловаться на чат и канал созданный @ник_пользователя  привязанный к каналу [id чата]. В чате данного канала и в самом канале регулярно нарушаются конституция рф и публикуются незаконные материалы с целью шантажа. 

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    Чат [id чата] нарушает законодательство российской федерации о неприкосновенности частной жизни. 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    попасть в канал и чат модно по ссылкам [ссылка][ссылка]

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    По вышесказанному просьба: 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    1: Провести проверку чата и канала. 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    2: Удалить все незаконные материалы.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    3: Предотвратить распространение нелегального контента, и пропаганды`
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                );
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
